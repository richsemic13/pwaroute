<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Iloilo Travel Route</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1e63d5">

</head>

<body>

<div class="app">

<div class="header">

<h1>Iloilo Travel Route</h1>

<select id="routeSelect">
<option value="">Select Route</option>
<option>Iloilo City - Oton</option>
<option>Iloilo City - Pavia</option>
<option>Iloilo City - Jaro</option>
<option>Iloilo City - Miagao</option>
<option>Iloilo City - Concepcion</option>
</select>

<div class="buttons">
<button class="save" onclick="saveRoute()">Save Route</button>
<button class="show" onclick="showRoutes()">Show Routes</button>
</div>

</div>

<div id="savedRoutes"></div>

</div>

<script src="script.js"></script>

<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js')
}
</script>

</body>
</html>
